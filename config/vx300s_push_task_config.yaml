vx300s: #namespace

    # ******** Task Related parameters (we don't use these)
    max_steps: 1000  # Maximum number of steps (not currently used)

    # ******** Action Space
    # Define the minimum and maximum joint values with the gripper open
    min_joint_pos:
      - -3.14  # waist
      - -1.85  # shoulder
      - -1.76  # elbow
      - -3.14  # forearm_roll
      - -1.87  # wrist_angle
      - -3.14  # wrist_rotate

    max_joint_pos:
      - 3.14   # waist
      - 1.26   # shoulder
      - 1.61   # elbow
      - 3.14   # forearm_roll
      - 2.23   # wrist_angle
      - 3.14   # wrist_rotate

    # Define the minimum and maximum joint values for grasping. Not used by
    # the push mixin (push uses the closed gripper as a flat pusher; we
    # never command finger joints). Kept here so the YAML shape matches
    # reach / pnp configs and any shared loader iterating over robots
    # works without special-casing push.
    min_joint_pos_grasp:
      - -3.14   # waist
      - -1.85   # shoulder
      - -1.76   # elbow
      - -3.14   # forearm_roll
      - -1.87   # wrist_angle
      - -3.14   # wrist_rotate
      - 0.021   # left_finger
      - -0.057  # right_finger

    max_joint_pos_grasp:
      - 3.14   # waist
      - 1.26   # shoulder
      - 1.61   # elbow
      - 3.14   # forearm_roll
      - 2.23   # wrist_angle
      - 3.14   # wrist_rotate
      - 0.057  # left_finger
      - -0.021 # right_finger

    # ******** Observation Space

    position_ee_max: # Maximum XYZ position for the end effector (EE) (reach is 55cm)
      x: 0.55
      y: 0.55
      z: 0.55
    position_ee_min: # Minimum XYZ position for the EE
      x: -0.55
      y: -0.55
      z: -0.55  # Loose obs bound so transient sim states don't trip gymnasium's
                # obs-not-in-space warning. The actual table floor is enforced
                # by workspace_min.z + the per-link FK safety check, not here.

    rpy_ee_max: # Maximum roll, pitch, and yaw (RPY) values for the EE
      r: 6.2832
      p: 6.2832
      y: 6.2832
    rpy_ee_min: # Minimum rpy position for the EE
      r: -6.2832
      p: -6.2832
      y: -6.2832

    position_cube_max: # Maximum XYZ position for the cube (since it can be with the gripper)
      x: 0.55
      y: 0.55
      z: 0.55
    position_cube_min: # Minimum XYZ position for the cube
      x: -0.55
      y: -0.55
      z: 0.00

    rpy_cube_max: # Maximum rpy for the cube
      r: 6.28
      p: 6.28
      y: 6.28
    rpy_cube_min: # Minimum rpy for the cube
      r: -6.28
      p: -6.28
      y: -6.28

    # Cube velocities — finite-differenced from cube pose (sim and real
    # share the same code path; no Gazebo-specific twist API needed).
    # ±2 m/s leaves slack for transient sim spikes; a pushed cube
    # typically slides at <1 m/s.
    linear_velocity_cube_max:
      x: 2.0
      y: 2.0
      z: 2.0
    linear_velocity_cube_min:
      x: -2.0
      y: -2.0
      z: -2.0

    # Angular velocity in rad/s. ±20 covers a tumbling/spinning cube
    # under push contact; nominal pushing rarely exceeds a few rad/s.
    angular_velocity_cube_max:
      r: 20.0
      p: 20.0
      y: 20.0
    angular_velocity_cube_min:
      r: -20.0
      p: -20.0
      y: -20.0

    # Cube position relative to the EE (cube_pos - ee_pos). Bounds
    # derived from workspace span — cube can be anywhere reachable
    # relative to the EE.
    cube_rel_to_ee_max:
      x: 1.10
      y: 1.10
      z: 1.10
    cube_rel_to_ee_min:
      x: -1.10
      y: -1.10
      z: -1.10

    # not used in this task (so values are not set)
    linear_distance_max: # Maximum distance from cube to the desired goal (spans 110cm)
      x: 1.00
      y: 1.00
      z: 0.50
    linear_distance_min: # Minimum distance from cube to the desired goal
      x: -1.00
      y: -1.00
      z: -0.50

    max_distance: 0.55 # Maximum distance from cube to the desired GOAL (0.55m is the max reach of the robot)

    min_joint_angles:
      - -1.76   # elbow
      - -3.14   # forearm_roll
      - -6.28   # gripper
      - 0.020   # left_finger
      - -0.060  # right_finger
      - -1.85   # shoulder
      - -3.14   # waist
      - -1.87   # wrist_angle
      - -3.14   # wrist_rotate

    max_joint_angles:
      - 1.61    # elbow
      - 3.14    # forearm_roll
      - 6.28    # gripper
      - 0.060   # left_finger
      - -0.020  # right_finger
      - 1.26    # shoulder
      - 3.14    # waist
      - 2.23    # wrist_angle
      - 3.14    # wrist_rotate

    # Arm joint velocity bounds match the URDF cap pi rad/s for every arm
    # joint; fingers match URDF 1.0 m/s; the gripper virtual scalar mirrors
    # the binding finger limit.
    min_joint_vel:
      - -3.14   # elbow
      - -3.14   # forearm_roll
      - -1.0    # gripper (virtual scalar; bound by finger physical limit)
      - -1.0    # left_finger
      - -1.0    # right_finger
      - -3.14   # shoulder
      - -3.14   # waist
      - -3.14   # wrist_angle
      - -3.14   # wrist_rotate

    max_joint_vel:
      - 3.14    # elbow
      - 3.14    # forearm_roll
      - 1.0     # gripper (virtual scalar; bound by finger physical limit)
      - 1.0     # left_finger
      - 1.0     # right_finger
      - 3.14    # shoulder
      - 3.14    # waist
      - 3.14    # wrist_angle
      - 3.14    # wrist_rotate

    # ******** goal space
    position_goal_max: # Maximum XYZ position for the goal
      x: 0.35
      y: 0.15
      z: 0.025  # we set this explicitly inside the script, so we are not using the value here
    position_goal_min: # Minimum XYZ position for the goal
      x: 0.20  # bumped from 0.15: vx300s is longer-armed than RX200, so
               # goals too close to base sit inside the dead-zone where
               # IK can't reach without folding into self-collision.
      y: -0.15
      z: 0.015  # Near zero to prevent going below the table

    # ******** Workspace -  we need to restrict the workspace to prevent the robot from hitting the table or itself
    workspace_max: # Maximum XYZ position for the workspace
      x: 0.55
      y: 0.55
      z: 0.55
    workspace_min: # Minimum XYZ position for the workspace (active EE/link safety floor)
      x: 0.10
      y: -0.55
      z: 0.06  # EE floor for push: higher than reach because the EE pushes a
               # 2 cm cube sitting on the table; needs gripper-tip clearance.


    # ******** achieved_goal and desired_goal
    # Push semantics: the achieved_goal tracks the CUBE pose, not the EE.
    # The cube sits on the table at z ≈ 0.015 (half its 0.02 m edge above
    # the table surface), so achieved/desired z floors are intentionally
    # below workspace_min.z (which constrains the arm, not the cube).
    position_achieved_goal_max: # Maximum XYZ position for the cube
      x: 0.55
      y: 0.55
      z: 0.55
    position_achieved_goal_min: # Minimum XYZ position for the cube
      x: -0.55
      y: -0.55
      z: 0.005  # half a cube-edge above the table

    # In this task, this is the same as goal-sampling range.
    position_desired_goal_max: # Maximum XYZ position for the desired_goal
      x: 0.40
      y: 0.40
      z: 0.40
    position_desired_goal_min: # Minimum XYZ position for the desired_goal
      x: 0.20  # match position_goal_min.x (vx300s near-base dead-zone)
      y: -0.40
      z: 0.005


    # ******** Gazebo Simulation parameters
    gazebo_time_step: 0.001  # matches Gazebo's default
    # Real-time factor for Gazebo physics. Keep at 1.0: the framework's
    # production envs run with real_time=True (no pause/unpause), and
    # the env loop is driven by rospy.Timer at a wall-clock rate. Anything
    # above 1.0 lets physics outpace the agent's wall-clock-paced control
    # loop, which breaks behaviour.
    gazebo_update_rate_multiplier: 1.0


    # ******** Real-side cube tracking (consumed by VX300SPushReal /
    # VX300SPushGoalReal). Real envs subscribe to a vision pipeline
    # that publishes geometry_msgs/PoseStamped on ``cube_pose_topic``.
    # If no message arrives within cube_pose_timeout_s, the env falls
    # back to ``cube_init_pos`` and emits a throttled warning. The
    # fallback path keeps the env constructible during dry-runs
    # even when no vision pipeline is wired up.
    cube_pose_timeout_s: 1.0
    cube_init_pos: [0.25, 0.0, 0.015]


    # ******** Tolerance for the position of the goal
    reach_tolerance: 0.05


    # ******** Variables related to rewards
    step_reward: -0.5
    multiplier_dist_reward: 2.0
    reached_goal_reward: 20
    joint_limits_reward: -2.0
    none_exe_reward: -5.0
    not_within_goal_space_reward: -2.0


    # ******** Safety (consumed by VX300SRobotEnv per-link FK check)
    # Same defaults as vx300s_reach_task_config.yaml. See that file for the
    # rationale on each value.
    table_z: -0.005
    safety_z_margin: 0.015
    safety_z_margin_strict: 0.030
    max_joint_delta: 0.5
    max_joint_delta_strict: 0.15
    joint_state_timeout_s: 0.5
    ee_pose_timeout_s: 0.5

