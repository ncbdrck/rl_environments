vx300s: #namespace

    # ******** Task Related parameters (we don't use these)
    max_steps: 1000  # Maximum number of steps (not currently used)

    # ******** Action Space
    # PnP action space = 6 arm joints + 1 gripper scalar (7 DOF).
    # The gripper scalar drives both fingers symmetrically:
    #   left_finger = gripper_cmd,  right_finger = -gripper_cmd
    # so [0.021, 0.057] maps to [closed, fully open] (VX300S finger stroke).

    min_joint_pos:
      - -3.14  # waist
      - -1.85  # shoulder
      - -1.76  # elbow
      - -3.14  # forearm_roll
      - -1.87  # wrist_angle
      - -3.14  # wrist_rotate

    max_joint_pos:
      - 3.14   # waist
      - 1.26   # shoulder
      - 1.61   # elbow
      - 3.14   # forearm_roll
      - 2.23   # wrist_angle
      - 3.14   # wrist_rotate

    # Single-scalar gripper command (meters, left_finger semantics).
    # right_finger = -gripper_cmd is set in execute_action.
    gripper_min: 0.021
    gripper_max: 0.057

    # Full 8-element grasp bounds (6 arm + 2 fingers). Used inside the
    # env for verifying fingers stay inside physical limits after the
    # scalar→pair mapping; also matches the YAML shape used by reach /
    # push for any shared loader.
    min_joint_pos_grasp:
      - -3.14   # waist
      - -1.85   # shoulder
      - -1.76   # elbow
      - -3.14   # forearm_roll
      - -1.87   # wrist_angle
      - -3.14   # wrist_rotate
      - 0.021   # left_finger
      - -0.057  # right_finger

    max_joint_pos_grasp:
      - 3.14   # waist
      - 1.26   # shoulder
      - 1.61   # elbow
      - 3.14   # forearm_roll
      - 2.23   # wrist_angle
      - 3.14   # wrist_rotate
      - 0.057  # left_finger
      - -0.021 # right_finger

    # ******** Observation Space

    position_ee_max:
      x: 0.55
      y: 0.55
      z: 0.55
    position_ee_min:
      x: -0.55
      y: -0.55
      z: -0.55

    rpy_ee_max:
      r: 6.2832
      p: 6.2832
      y: 6.2832
    rpy_ee_min:
      r: -6.2832
      p: -6.2832
      y: -6.2832

    position_cube_max:
      x: 0.55
      y: 0.55
      z: 0.55
    position_cube_min:
      x: -0.55
      y: -0.55
      z: 0.00

    rpy_cube_max:
      r: 6.28
      p: 6.28
      y: 6.28
    rpy_cube_min:
      r: -6.28
      p: -6.28
      y: -6.28

    # Cube velocity bounds (finite-diff). PnP can spin the cube faster
    # than push (lifting + rotating), so angular slack matches push.
    linear_velocity_cube_max:
      x: 2.0
      y: 2.0
      z: 2.0
    linear_velocity_cube_min:
      x: -2.0
      y: -2.0
      z: -2.0
    angular_velocity_cube_max:
      r: 20.0
      p: 20.0
      y: 20.0
    angular_velocity_cube_min:
      r: -20.0
      p: -20.0
      y: -20.0

    # Cube position relative to EE.
    cube_rel_to_ee_max:
      x: 1.10
      y: 1.10
      z: 1.10
    cube_rel_to_ee_min:
      x: -1.10
      y: -1.10
      z: -1.10

    linear_distance_max:
      x: 1.00
      y: 1.00
      z: 0.50
    linear_distance_min:
      x: -1.00
      y: -1.00
      z: -0.50

    max_distance: 1.00 # Max distance from cube to PnP goal (lifted goals span more)

    min_joint_angles:
      - -1.76   # elbow
      - -3.14   # forearm_roll
      - -6.28   # gripper
      - 0.020   # left_finger
      - -0.060  # right_finger
      - -1.85   # shoulder
      - -3.14   # waist
      - -1.87   # wrist_angle
      - -3.14   # wrist_rotate

    max_joint_angles:
      - 1.61    # elbow
      - 3.14    # forearm_roll
      - 6.28    # gripper
      - 0.060   # left_finger
      - -0.020  # right_finger
      - 1.26    # shoulder
      - 3.14    # waist
      - 2.23    # wrist_angle
      - 3.14    # wrist_rotate

    # Arm joints (and the gripper continuous virtual joint) match the
    # URDF cap pi rad/s; fingers match URDF 1.0 m/s.
    min_joint_vel:
      - -3.14   # elbow
      - -3.14   # forearm_roll
      - -3.14   # gripper (continuous virtual joint, URDF velocity=pi)
      - -1.0    # left_finger
      - -1.0    # right_finger
      - -3.14   # shoulder
      - -3.14   # waist
      - -3.14   # wrist_angle
      - -3.14   # wrist_rotate

    max_joint_vel:
      - 3.14    # elbow
      - 3.14    # forearm_roll
      - 3.14    # gripper (continuous virtual joint, URDF velocity=pi)
      - 1.0     # left_finger
      - 1.0     # right_finger
      - 3.14    # shoulder
      - 3.14    # waist
      - 3.14    # wrist_angle
      - 3.14    # wrist_rotate

    # ******** goal space
    # PnP goal can be elevated (place at height) — z up to 0.25 m above
    # the table to cover lift-and-place scenarios. Push had z fixed to
    # ~table-top; PnP releases that constraint.
    position_goal_max:
      x: 0.35
      y: 0.20
      z: 0.25
    position_goal_min:
      x: 0.20  # bumped from 0.15: vx300s is longer-armed than RX200, so
               # goals too close to base sit inside the dead-zone where
               # IK can't reach without folding into self-collision.
      y: -0.20
      z: 0.025

    # ******** Workspace
    workspace_max:
      x: 0.55
      y: 0.55
      z: 0.55
    workspace_min:
      x: 0.10
      y: -0.55
      z: 0.04  # Slightly lower than push to allow approach-from-above
               # without the EE clipping the table edge.

    # ******** achieved_goal and desired_goal
    # PnP tracks the CUBE pose as achieved_goal (same as push).
    position_achieved_goal_max:
      x: 0.55
      y: 0.55
      z: 0.55
    position_achieved_goal_min:
      x: -0.55
      y: -0.55
      z: 0.005

    # Desired-goal bounds = sampling box (so HER-relabeled samples stay
    # in-space).
    position_desired_goal_max:
      x: 0.35
      y: 0.20
      z: 0.25
    position_desired_goal_min:
      x: 0.20  # match position_goal_min.x (vx300s near-base dead-zone)
      y: -0.20
      z: 0.025


    # ******** Gazebo Simulation parameters
    gazebo_time_step: 0.001
    gazebo_update_rate_multiplier: 1.0


    # ******** Real-side cube tracking (consumed by VX300SPnPReal /
    # VX300SPnPGoalReal). Real envs subscribe to a vision pipeline
    # that publishes geometry_msgs/PoseStamped on ``cube_pose_topic``.
    # If no message arrives within cube_pose_timeout_s, the env falls
    # back to ``cube_init_pos`` and emits a throttled warning.
    cube_pose_timeout_s: 1.0
    cube_init_pos: [0.25, 0.0, 0.015]


    # ******** Tolerance for the position of the goal
    reach_tolerance: 0.05

    # ******** Grasp-detection thresholds (used to derive is_grasped in obs
    # and to gate the grasp-aware dense reward terms). The cube edge is
    # ~0.02 m; with fingers half-closed the EE→cube distance at successful
    # grasp is well under 5 cm. Finger threshold: a quarter of the open
    # range above the closed extreme — i.e. roughly "fingers actively
    # closing on something".
    grasp_dist_thresh: 0.05    # m, EE-to-cube distance ceiling
    grasp_finger_thresh: 0.024 # m, left_finger position ceiling (closed if <)

    # Multi-goal scaffolding (used only when multi_goal=True). The
    # intermediate goal is set to the cube spawn position lifted by
    # ``lift_height`` so the agent first learns "pick up", then "place".
    lift_height: 0.15  # m, height of intermediate (lift) goal above cube


    # ******** Variables related to rewards
    step_reward: -0.5
    multiplier_dist_reward: 2.0
    reached_goal_reward: 20
    joint_limits_reward: -2.0
    none_exe_reward: -5.0
    not_within_goal_space_reward: -2.0


    # ******** Safety (consumed by VX300SRobotEnv per-link FK check)
    # Same defaults as push / reach. See vx300s_reach_task_config.yaml for
    # the rationale on each value.
    table_z: -0.005
    safety_z_margin: 0.015
    safety_z_margin_strict: 0.030
    max_joint_delta: 0.5
    max_joint_delta_strict: 0.15
    joint_state_timeout_s: 0.5
    ee_pose_timeout_s: 0.5
