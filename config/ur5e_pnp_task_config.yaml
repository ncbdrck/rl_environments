ur5e: # namespace

    # ******** Task Related parameters (not used by the env)
    max_steps: 1000

    # ******** Action Space — 6 arm joints (gripper scalar appended in
    # execute_action via action[-1], not via this array).
    min_joint_pos:
      - -3.14
      - -3.14
      - -3.14
      - -3.14
      - -3.14
      - -3.14

    max_joint_pos:
      - 3.14
      - 3.14
      - 3.14
      - 3.14
      - 3.14
      - 3.14

    # 6 arm + 1 Robotiq knuckle (mimic linkage drives other finger
    # joints). Knuckle stroke 0.0–0.8 rad.
    min_joint_pos_grasp:
      - -3.14
      - -3.14
      - -3.14
      - -3.14
      - -3.14
      - -3.14
      -  0.0
    max_joint_pos_grasp:
      - 3.14
      - 3.14
      - 3.14
      - 3.14
      - 3.14
      - 3.14
      - 0.8

    # ******** Observation Space (same UR5e geometry as push).
    position_ee_max:
      x: 1.20
      y: 0.90
      z: 1.50
    position_ee_min:
      x: -0.90
      y: -0.90
      z: 0.00

    rpy_ee_max:
      r: 6.2832
      p: 6.2832
      y: 6.2832
    rpy_ee_min:
      r: -6.2832
      p: -6.2832
      y: -6.2832

    position_cube_max:
      x: 1.20
      y: 0.90
      z: 1.50
    position_cube_min:
      x: -0.90
      y: -0.90
      z: 0.00

    rpy_cube_max:
      r: 6.28
      p: 6.28
      y: 6.28
    rpy_cube_min:
      r: -6.28
      p: -6.28
      y: -6.28

    linear_velocity_cube_max:
      x: 2.0
      y: 2.0
      z: 2.0
    linear_velocity_cube_min:
      x: -2.0
      y: -2.0
      z: -2.0

    angular_velocity_cube_max:
      r: 20.0
      p: 20.0
      y: 20.0
    angular_velocity_cube_min:
      r: -20.0
      p: -20.0
      y: -20.0

    cube_rel_to_ee_max:
      x: 2.10
      y: 1.80
      z: 1.50
    cube_rel_to_ee_min:
      x: -2.10
      y: -1.80
      z: -1.50

    # Not used by pnp (kept for shape compatibility).
    linear_distance_max:
      x: 2.10
      y: 1.80
      z: 1.50
    linear_distance_min:
      x: -2.10
      y: -1.80
      z: -1.50

    max_distance: 2.10

    min_joint_angles:
      - -3.14   # elbow_joint
      -  0.0    # robotiq_85_left_knuckle_joint
      - -3.14   # shoulder_lift_joint
      - -3.14   # shoulder_pan_joint
      - -3.14   # wrist_1_joint
      - -3.14   # wrist_2_joint
      - -3.14   # wrist_3_joint
    max_joint_angles:
      - 3.14
      - 0.8
      - 3.14
      - 3.14
      - 3.14
      - 3.14
      - 3.14

    # Velocities follow the same alphabetical joint order as joint_angles.
    # Knuckle slot matches URDF velocity=0.5 rad/s (Robotiq 2F-85); arm
    # slots match URDF velocity=pi (shoulder/elbow; wrist URDF allows 2*pi,
    # kept tighter as a deliberate safety margin).
    min_joint_vel:
      - -3.15
      - -0.5
      - -3.15
      - -3.15
      - -3.15
      - -3.15
      - -3.15
    max_joint_vel:
      - 3.15
      - 0.5
      - 3.15
      - 3.15
      - 3.15
      - 3.15
      - 3.15

    # ******** PnP goal sampling — pick-and-place targets can lift off
    # the table (z up to ~0.95) so the agent learns place-at-height.
    # Goals lie above the cafe-table footprint within UR5e reach.
    position_goal_max:
      x: 0.80
      y: 0.30
      z: 0.95
    position_goal_min:
      x: 0.40
      y: -0.30
      z: 0.795

    # ******** Workspace (per-link FK safety check). Same as push.
    workspace_max:
      x: 1.20
      y: 0.85
      z: 1.50
    workspace_min:
      x: -0.30
      y: -0.85
      z: 0.55

    # ******** achieved / desired goal (goal-env tracks the CUBE).
    position_achieved_goal_max:
      x: 1.20
      y: 0.90
      z: 1.50
    position_achieved_goal_min:
      x: -0.90
      y: -0.90
      z: 0.00

    position_desired_goal_max:
      x: 0.80
      y: 0.30
      z: 0.95
    position_desired_goal_min:
      x: 0.40
      y: -0.30
      z: 0.795

    # ******** Gripper scalar bounds (knuckle action range).
    gripper_min: 0.0
    gripper_max: 0.8

    # ******** Gripper open / closed reference values.
    # Robotiq 2F-85 closes as the knuckle position grows. Used by the
    # env to know which end of the range means "open" vs "closed"
    # (opposite of VX300S prismatic-finger semantics).
    gripper_open_value: 0.0
    gripper_closed_value: 0.7

    # ******** Grasp detection.
    # grasp_finger_thresh: LOWER bound on the knuckle position; the
    # gripper is considered "closed enough to be grasping" when
    # knuckle_pos > grasp_finger_thresh. Tune empirically on hardware.
    grasp_dist_thresh: 0.05   # m, EE-to-cube distance ceiling
    grasp_finger_thresh: 0.30 # rad, knuckle floor for "closed"

    # ******** Multi-goal lift height (intermediate goal = cube + this).
    lift_height: 0.15

    # ******** Gazebo
    gazebo_time_step: 0.001
    gazebo_update_rate_multiplier: 1.0

    # ******** Real-side cube tracking (consumed by UR5ePnPReal /
    # UR5ePnPGoalReal). Same semantics as push.
    cube_pose_timeout_s: 1.0
    cube_init_pos: [0.5, -0.15, 0.795]

    # ******** Goal tolerance
    reach_tolerance: 0.05

    # ******** Reward shaping
    step_reward: -0.5
    multiplier_dist_reward: 2.0
    reached_goal_reward: 20
    joint_limits_reward: -2.0
    none_exe_reward: -5.0
    not_within_goal_space_reward: -2.0

    # ******** Safety (per-link FK check in UR5eRobotEnv).
    base_z: 0.59
    base_safety_z: 0.59
    table_z: 0.59  # legacy alias fallback
    table_top_z: 0.775
    table_center_x: 0.7
    table_center_y: 0.0
    table_size_x: 0.913
    table_size_y: 0.913
    table_xy_margin: 0.03
    safety_z_margin: 0.015
    safety_z_margin_strict: 0.030
    max_joint_delta: 0.5
    max_joint_delta_strict: 0.15
    joint_state_timeout_s: 0.5
    ee_pose_timeout_s: 0.5
